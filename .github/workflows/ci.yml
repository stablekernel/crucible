name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT: github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
  GOVULNCHECK: golang.org/x/vuln/cmd/govulncheck@v1.3.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: "**/go.sum"
      - name: golangci-lint (state)
        working-directory: state
        run: go run "$GOLANGCI_LINT" run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.26.x"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: "**/go.sum"
      - name: test -race (state)
        working-directory: state
        run: go test -race ./...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: "**/go.sum"
      - name: govulncheck (state)
        working-directory: state
        run: go run "$GOVULNCHECK" ./...

  coverage:
    runs-on: ubuntu-latest
    env:
      THRESHOLD: "80"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: "**/go.sum"
      - name: coverage gate (state)
        working-directory: state
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "total coverage: ${pct}% (threshold ${THRESHOLD}%)"
          awk -v p="$pct" -v t="$THRESHOLD" 'BEGIN { exit (p+0 < t+0) ? 1 : 0 }' \
            || { echo "::error::coverage ${pct}% is below the ${THRESHOLD}% threshold"; exit 1; }

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: "**/go.sum"
      - name: benchmarks (state, informational)
        working-directory: state
        run: go test -run '^$' -bench . -benchmem ./... | tee "$GITHUB_STEP_SUMMARY"
# As modules land (broker, store, sink), add their dirs to each job.
