name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT: github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
  GOVULNCHECK: golang.org/x/vuln/cmd/govulncheck@v1.3.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: "**/go.sum"
      - name: golangci-lint (state)
        working-directory: state
        run: go run "$GOLANGCI_LINT" run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.26.x"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: "**/go.sum"
      - name: test -race (state)
        working-directory: state
        run: go test -race ./...

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: "**/go.sum"
      - name: govulncheck (state)
        working-directory: state
        run: go run "$GOVULNCHECK" ./...
# As modules land (broker, store, sink), add their dirs to each job.
