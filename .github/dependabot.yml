version: 2
updates:
  # Library module: the state kernel.
  - package-ecosystem: gomod
    directory: /state
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"

  # Build-automation module.
  - package-ecosystem: gomod
    directory: /magefiles
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"

  # GitHub Actions workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
